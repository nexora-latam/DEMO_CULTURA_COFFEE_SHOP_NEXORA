<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toma de Pedidos - Cultura Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --surface-hover: #2c2c2c;
            --border: #333333;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-green: #a3e635; /* Verde estilo neón de tu imagen */
            --accent-dark: #166534;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            padding-bottom: 100px; /* Espacio para la barra inferior */
        }

        /* Encabezado */
        header { 
            background-color: var(--surface); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        
        .btn-volver { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid var(--border); 
            padding: 8px 15px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-volver:hover { background-color: var(--border); color: var(--text-main); }

        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .header-title i { color: var(--accent-green); }

        /* Tipo de Pedido (Selector Moderno) */
        .tipo-pedido-container { 
            display: flex; 
            padding: 20px; 
            gap: 15px; 
        }
        .btn-tipo { 
            flex: 1; 
            padding: 15px; 
            background-color: var(--surface); 
            border: 1px solid var(--border); 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-tipo.activo { 
            background-color: rgba(163, 230, 53, 0.1); 
            border-color: var(--accent-green); 
            color: var(--accent-green); 
        }

        /* Input de Mesa */
        .mesa-input { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 15px 20px; 
            margin: 0 20px 20px 20px;
            background-color: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 12px;
        }
        .mesa-input input { 
            width: 80px; 
            padding: 10px; 
            font-size: 16px; 
            text-align: center; 
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border); 
            border-radius: 8px;
            outline: none;
            font-weight: bold;
        }
        .mesa-input input:focus { border-color: var(--accent-green); }

        /* Catálogo de Productos */
        .seccion { padding: 0 20px 20px 20px; }
        .seccion-titulo { 
            color: var(--text-muted); 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px;
        }
        
        .producto-card { 
            background-color: var(--surface); 
            padding: 20px 15px; 
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: transform 0.1s, background-color 0.2s; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .producto-card:active { transform: scale(0.95); }
        .producto-card:hover { border-color: #555; background-color: var(--surface-hover); }
        
        .producto-icono { font-size: 24px; color: var(--text-muted); margin-bottom: 5px; }
        .producto-nombre { font-size: 15px; font-weight: 600; }
        .producto-precio { color: var(--accent-green); font-weight: 700; font-size: 16px; }

        /* Resumen Inferior (Carrito) */
        #resumen-fijo { 
            position: fixed; 
            bottom: 0; left: 0; 
            width: 100%; 
            background-color: var(--surface); 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid var(--border);
            z-index: 20;
        }
        
        .total-info span { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .total-info b { font-size: 24px; display: block; margin-top: 5px;}
        
        .btn-confirmar { 
            background-color: var(--accent-green); 
            color: #000000; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn-confirmar:hover { background-color: #90d12c; transform: translateY(-2px); }
    </style>
</head>
