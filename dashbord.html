<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo Simple - Cultura Coffee</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #dcdedd; }
        
        /* Barra superior */
        header { background: #233447; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-menu { background: #116c27; color: white; border: none; padding: 10px 15px; font-size: 18px; cursor: pointer; border-radius: 3px; }
        
        /* Menú lateral */
        #menuLateral { 
            position: fixed; top: 60px; left: -250px; width: 220px; height: calc(100vh - 60px); 
            background: #2c4159; transition: 0.3s; padding: 20px; z-index: 10;
            display: flex; flex-direction: column; /* Para empujar opciones al fondo */
        }
        #menuLateral.abierto { left: 0; }
        #menuLateral a { color: white; display: block; margin-bottom: 20px; text-decoration: none; font-size: 17px; }

        /* Sección de abajo del menú */
        .menu-inferior { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); pt: 15px; padding-top: 15px; }
        .btn-salir { color: #ff6b6b !important; font-weight: bold; }

        /* Botón flotante */
        #contenedorFab { position: fixed; bottom: 30px; right: 30px; text-align: right; }
        #subOpciones { display: none; margin-bottom: 15px; }
        #subOpciones p { background: white; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; font-size: 14px; }
        #btnFlotante { background: #2a5a8f; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header>
        <button class="btn-menu" onclick="document.getElementById('menuLateral').classList.toggle('abierto')">☰</button>
        <h2 style="font-size: 18px;">Demo cultura coffe shop </h2>
    </header>

    <div id="menuLateral">
        <div class="menu-superior">
            <a href="#">📦 Inventario</a>
            <a href="#">💰 Cuentas</a>
            <a href="#">⚙️ Ajustes</a>
        </div>

        <div class="menu-inferior">
            <a href="#" onclick="alert('Abriendo Perfil...')">👤 Ingresar Cuenta</a>
            <a href="#" class="btn-salir" onclick="confirm('¿Deseas salir del sistema?')">🚪 Salir</a>
        </div>
    </div>

    <div id="contenedorFab">
        <div id="subOpciones">
            <p>📝 Cotización</p>
            <p>📄 Pedido</p>
            <p>💳 Abono</p>
        </div>
        <button id="btnFlotante" onclick="toggleFab()">➕</button>
    </div>

    <script>
        function toggleFab() {
            let menu = document.getElementById('subOpciones');
            let btn = document.getElementById('btnFlotante');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
                btn.innerHTML = '➕';
            } else {
                menu.style.display = 'block';
                btn.innerHTML = '✖️';
            }
        }
    </script>

</body>
</html>
