<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Cultura Coffee Shop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Fondo principal gris súper claro (Tailwind gray-50) */
            color: #1f2937; /* Texto principal oscuro */
            margin: 0;
            overflow-x: hidden;
        }

        /* Menú lateral (Off-canvas) */
        #menuLateral { 
            position: fixed; 
            top: 0; 
            left: -100%; /* Oculto por defecto */
            width: 280px; 
            height: 100vh; 
            height: 100dvh;
            background-color: #ffffff; /* Fondo blanco */
            border-right: 1px solid #e5e7eb; /* Borde gris claro */
            transition: left 0.3s ease-in-out; 
            z-index: 50;
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }
        #menuLateral.abierto { left: 0; }

        /* Overlay oscuro cuando el menú está abierto en móviles */
        #menuOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4); /* Overlay un poco más suave */
            z-index: 40;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #menuOverlay.abierto {
            display: block;
            opacity: 1;
        }

        /* Custom Scrollbar adaptado a fondo blanco */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f9fafb; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #10B981; }
    </style>
</head>
<body class="antialiased">

    <!-- Header superior -->
    <header class="bg-white border-b border-gray-200 p-4 flex items-center justify-between sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-3">
            <button id="btnMenu" class="text-gray-500 hover:text-emerald-600 focus:outline-none transition-colors p-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
            <div class="flex items-center gap-2">
                <!-- Imagen de Nexora en lugar del ícono verde -->
                <img 
                    src="nexora.jpg" 
                    alt="Nexora Logo" 
                    class="w-8 h-8 sm:w-9 sm:h-9 object-cover rounded-lg border border-gray-200 shadow-sm"
                    onerror="this.onerror=null; this.src='https://placehold.co/100x100/10B981/ffffff?text=NX';"
                />
                <h2 class="text-lg font-bold tracking-wider text-gray-800">Nexora <span class="text-emerald-600 font-medium text-sm"> - Cultura Coffee Shop</span></h2>
            </div>
        </div>
        
        <!-- Avatar pequeño arriba a la derecha -->
        <button onclick="abrirCuenta()" class="w-9 h-9 rounded-full bg-emerald-50 border border-emerald-200 flex items-center justify-center text-emerald-600 font-bold hover:bg-emerald-600 hover:text-white transition-colors shadow-sm">
            <span id="headerAvatar">U</span>
        </button>
    </header>

    <!-- Overlay oscuro -->
    <div id="menuOverlay"></div>

    <!-- Menú Lateral -->
    <div id="menuLateral">
        <!-- Encabezado del Menú -->
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500 font-semibold tracking-widest uppercase">Menú Principal</span>
            </div>
            <button id="btnCerrarMenu" class="text-gray-400 hover:text-gray-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Enlaces Principales -->
        <div class="flex-1 p-4 overflow-y-auto space-y-2">
            <a href="Inventory.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" /></svg>
                Inventario
            </a>
            <a href="pto_venta.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" /></svg>
                Punto de Venta
            </a>
            <a href="pedido.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 15.75h3.75M18 1.5v21m-12-21v21m12-21H6m12 0a2.25 2.25 0 002.25 2.25V19.5A2.25 2.25 0 0118 21.75H6a2.25 2.25 0 01-2.25-2.25V3.75A2.25 2.25 0 016 1.5h12z" /></svg>
                Toma de Pedidos
            </a>
        </div>

        <!-- Sección Inferior (Cuenta y Salir) -->
        <div class="p-4 border-t border-gray-100 space-y-2 bg-gray-50/50">
            <button onclick="abrirCuenta()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-gray-700 bg-white hover:bg-emerald-50 hover:text-emerald-700 border border-gray-200 shadow-sm transition-all">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
                    <span class="font-medium text-sm">Mi Cuenta</span>
                </div>
            </button>

            <button onclick="cerrarSesion()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                Salir del Sistema
            </button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="p-6 sm:p-8 max-w-5xl mx-auto">
        <div class="mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">Hola, <span id="nombreUsuarioMain" class="text-emerald-600">Usuario</span></h1>
        </div>

        <!-- El contenido de las tarjetas y el texto inferior ha sido removido. 
             Espacio listo para las nuevas gráficas o reportes. -->
    </main>

    <!-- Modal de Cuenta de Usuario -->
    <div id="modalCuenta" class="fixed inset-0 bg-black/40 z-[60] flex justify-center items-center p-4 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-white border border-gray-200 rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300" id="modalCuentaContent">
            
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-lg font-bold text-gray-800">Perfil de Usuario</h3>
                <button onclick="cerrarCuenta()" class="text-gray-400 hover:text-gray-800 p-1 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <div class="flex flex-col items-center py-6 border-y border-gray-100 mb-6">
                <div class="w-20 h-20 rounded-full bg-emerald-50 border-2 border-emerald-500 flex items-center justify-center text-emerald-600 text-3xl font-bold mb-3 shadow-[0_0_15px_rgba(16,185,129,0.15)]">
                    <span id="modalAvatarInitials">U</span>
                </div>
                <h4 class="text-xl font-bold text-gray-800" id="modalUsername">Cargando...</h4>
                <p class="text-emerald-600 text-sm font-medium mt-1">Acceso Autorizado</p>
                <span class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full mt-3 font-medium border border-gray-200">Miembro Activo</span>
            </div>

            <button onclick="cerrarSesion()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3 px-4 rounded-xl transition-colors border border-red-200 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                Cerrar Sesión
            </button>
        </div>
    </div>

    <!-- Botón Flotante (FAB) rediseñado -->
    <div class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-20 flex flex-col items-end">
        <div id="subOpciones" class="hidden flex-col items-end gap-3 mb-4 transition-all origin-bottom">
            <button class="bg-white border border-gray-200 text-gray-700 px-4 py-2.5 rounded-full shadow-lg hover:border-emerald-500 hover:text-emerald-600 transition-all text-sm font-medium flex items-center gap-2">
                📝 Cotización
            </button>
            <button class="bg-white border border-gray-200 text-gray-700 px-4 py-2.5 rounded-full shadow-lg hover:border-emerald-500 hover:text-emerald-600 transition-all text-sm font-medium flex items-center gap-2">
                💳 Abono
            </button>
        </div>
        <button id="btnFlotante" onclick="toggleFab()" class="bg-emerald-600 text-white border-none rounded-full w-14 h-14 flex items-center justify-center shadow-lg shadow-emerald-600/40 hover:bg-emerald-500 transition-transform active:scale-95 focus:outline-none">
            <svg id="iconPlus" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 transition-transform duration-300"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
    </div>

    <script>
        // --- GESTIÓN DE USUARIO DESDE EL LOGIN ---
        // Leer el usuario de localStorage (guardado en el Login)
        const usuarioActual = localStorage.getItem('cultura_user') || 'Usuario Demo';
        
        // Función para inicializar los textos con el nombre del usuario
        function cargarDatosUsuario() {
            document.getElementById('nombreUsuarioMain').textContent = usuarioActual;
            document.getElementById('modalUsername').textContent = usuarioActual;
            
            // Obtener la inicial para el avatar
            const inicial = usuarioActual.charAt(0).toUpperCase();
            document.getElementById('headerAvatar').textContent = inicial;
            document.getElementById('modalAvatarInitials').textContent = inicial;
        }

        // --- LÓGICA DEL MENÚ LATERAL ---
        const menuLateral = document.getElementById('menuLateral');
        const menuOverlay = document.getElementById('menuOverlay');
        const btnMenu = document.getElementById('btnMenu');
        const btnCerrarMenu = document.getElementById('btnCerrarMenu');

        function toggleMenu() {
            menuLateral.classList.toggle('abierto');
            menuOverlay.classList.toggle('abierto');
        }

        btnMenu.addEventListener('click', toggleMenu);
        btnCerrarMenu.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', toggleMenu);

        // --- LÓGICA DEL BOTÓN FLOTANTE (FAB) ---
        function toggleFab() {
            const menuOpciones = document.getElementById('subOpciones');
            const iconPlus = document.getElementById('iconPlus');
            
            if (menuOpciones.classList.contains('hidden')) {
                menuOpciones.classList.remove('hidden');
                menuOpciones.classList.add('flex');
                iconPlus.style.transform = 'rotate(45deg)'; // Convierte el + en una X
            } else {
                menuOpciones.classList.add('hidden');
                menuOpciones.classList.remove('flex');
                iconPlus.style.transform = 'rotate(0deg)';
            }
        }

        // --- LÓGICA MODAL DE CUENTA ---
        const modalCuenta = document.getElementById('modalCuenta');
        const modalCuentaContent = document.getElementById('modalCuentaContent');

        function abrirCuenta() {
            // Cerramos el menú lateral por si estaba abierto
            menuLateral.classList.remove('abierto');
            menuOverlay.classList.remove('abierto');
            
            // Mostramos el modal
            modalCuenta.classList.remove('hidden');
            setTimeout(() => {
                modalCuenta.classList.remove('opacity-0');
                modalCuentaContent.classList.remove('scale-95');
                modalCuentaContent.classList.add('scale-100');
            }, 10);
        }

        function cerrarCuenta() {
            modalCuenta.classList.add('opacity-0');
            modalCuentaContent.classList.remove('scale-100');
            modalCuentaContent.classList.add('scale-95');
            setTimeout(() => {
                modalCuenta.classList.add('hidden');
            }, 300); // Esperar la animación antes de ocultar
        }

        // --- CERRAR SESIÓN ---
        function cerrarSesion() {
            if (confirm('¿Deseas salir del sistema?')) {
                localStorage.removeItem('cultura_user'); // Borrar los datos del usuario
                window.location.href = 'login.html';     // Redirigir al login
            }
        }

        // Iniciar al cargar la página
        window.onload = cargarDatosUsuario;
    </script>
</body>
</html>
