<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toma de Pedidos - Cultura Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #ffffff; }
        .active-tab { background-color: rgba(163, 230, 53, 0.1); border-color: #a3e635; color: #a3e635; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-[#1e1e1e] p-4 flex items-center justify-between sticky top-0 z-50 border-b border-[#333]">
        <a href="dashboard_demo_cultura_coffee_shop.html" class="text-gray-400 border border-[#333] px-3 py-2 rounded-lg flex items-center gap-2 text-sm">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
        <div class="font-bold flex items-center gap-2">
            <i class="fas fa-coffee text-[#a3e635]"></i> Nueva Orden
        </div>
    </header>

    <div class="flex p-4 gap-4">
        <button id="btnMesa" onclick="setTipo('mesa')" class="flex-1 p-4 rounded-xl border border-[#333] bg-[#1e1e1e] font-bold active-tab">
            <i class="fas fa-utensils"></i> Mesa
        </button>
        <button id="btnLlevar" onclick="setTipo('llevar')" class="flex-1 p-4 rounded-xl border border-[#333] bg-[#1e1e1e] font-bold text-gray-500">
            <i class="fas fa-shopping-bag"></i> Llevar
        </button>
    </div>

    <div id="cajaMesa" class="mx-4 p-4 bg-[#1e1e1e] border border-[#333] rounded-xl flex justify-between items-center mb-6">
        <span class="text-gray-400">Número de mesa:</span>
        <input type="number" id="numMesa" class="w-16 bg-[#121212] border border-[#333] rounded-lg p-2 text-center font-bold outline-none focus:border-[#a3e635]" placeholder="#">
    </div>

    <div class="px-4 space-y-6">
        <div>
            <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Cafetería</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="add('Espresso', 15)" class="bg-[#1e1e1e] p-4 rounded-2xl border border-[#333] text-center active:scale-95 transition-transform">
                    <i class="fas fa-mug-hot text-gray-500 mb-2"></i>
                    <p class="font-bold text-sm">Espresso</p>
                    <p class="text-[#a3e635] font-bold">Q15</p>
                </button>
                <button onclick="add('Latte', 22)" class="bg-[#1e1e1e] p-4 rounded-2xl border border-[#333] text-center active:scale-95 transition-transform">
                    <i class="fas fa-coffee text-gray-500 mb-2"></i>
                    <p class="font-bold text-sm">Latte</p>
                    <p class="text-[#a3e635] font-bold">Q22</p>
                </button>
            </div>
        </div>

        <div>
            <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Panadería</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="add('Croissant', 12)" class="bg-[#1e1e1e] p-4 rounded-2xl border border-[#333] text-center active:scale-95 transition-transform">
                    <i class="fas fa-bread-slice text-gray-500 mb-2"></i>
                    <p class="font-bold text-sm">Croissant</p>
                    <p class="text-[#a3e635] font-bold">Q12</p>
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#1e1e1e] p-5 border-t border-[#333] flex justify-between items-center z-50">
        <div>
            <p class="text-gray-500 text-xs uppercase">Total Pedido</p>
            <p class="text-2xl font-bold">Q <span id="total">0.00</span></p>
        </div>
        <button onclick="send()" class="bg-[#a3e635] text-black px-8 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-[#90d12c]">
            Enviar <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        let total = 0;
        let items = [];
        let tipo = 'mesa';

        function setTipo(t) {
            tipo = t;
            document.getElementById('btnMesa').className = t === 'mesa' ? 'flex-1 p-4 rounded-xl border font-bold active-tab' : 'flex-1 p-4 rounded-xl border border-[#333] bg-[#1e1e1e] font-bold text-gray-500';
            document.getElementById('btnLlevar').className = t === 'llevar' ? 'flex-1 p-4 rounded-xl border font-bold active-tab' : 'flex-1 p-4 rounded-xl border border-[#333] bg-[#1e1e1e] font-bold text-gray-500';
            document.getElementById('cajaMesa').style.display = t === 'mesa' ? 'flex' : 'none';
        }

        function add(n, p) {
            total += p;
            items.push(n);
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function send() {
            if (items.length === 0) return alert("Agrega productos primero");
            let m = tipo === 'mesa' ? "Mesa #" + document.getElementById('numMesa').value : "Para Llevar";
            if (tipo === 'mesa' && !document.getElementById('numMesa').value) return alert("Pon el número de mesa");
            
            alert("Orden enviada: " + m + "\nTotal: Q" + total.toFixed(2));
            location.reload();
        }
    </script>
</body>
</html>
