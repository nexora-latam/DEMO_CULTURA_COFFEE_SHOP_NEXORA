<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cultura Coffee Shop - Sistema ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased overflow-y-auto">

    <div id="loginView" class="min-h-screen flex flex-col justify-center items-center p-4">
        <div class="w-full max-w-[22rem] sm:max-w-md bg-white p-6 sm:p-8 md:p-10 rounded-2xl shadow-lg border border-gray-100 flex flex-col items-center">
            
            <div class="mb-4 sm:mb-6 flex flex-col items-center">
                <img src="ccs.jpg" alt="Logo" class="w-24 h-24 sm:w-32 sm:h-32 object-cover rounded-full shadow-sm border-2 border-gray-100 bg-white"
                     onerror="this.src='https://placehold.co/200x200/0A1813/10B981?text=CULTURA\\nCOFFEE';">
            </div>
            
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-1 text-center">Bienvenido de nuevo</h2>
            <p class="text-gray-500 mb-6 text-center text-xs sm:text-sm">Ingresa al sistema de Cultura Coffee Shop</p>

            <form id="loginForm" class="w-full space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Usuario</label>
                    <input type="text" id="username" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" placeholder="Ej. admin" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm" placeholder="••••••••" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-[#0A1813] hover:bg-emerald-800 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-sm flex items-center justify-center gap-2">
                    <span id="btnText">Ingresar</span>
                </button>
            </form>
        </div>
        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500 font-medium">Desarrollado por <span class="text-[#0A1813] font-bold">NEXORA</span></p>
        </div>
    </div>

    <div id="dashboardView" class="hidden min-h-screen flex flex-col">
        <header class="bg-[#233447] text-white p-4 flex items-center justify-between shadow-md sticky top-0 z-50">
            <button onclick="toggleMenu()" class="bg-[#116c27] p-2 rounded-lg w-10 h-10 flex items-center justify-center">
                <i class="fas fa-bars"></i>
            </button>
            <div class="font-bold tracking-wider">SMARTBIT<span class="font-normal text-emerald-400">ERP</span></div>
        </header>

        <nav id="sidebar" class="fixed top-[72px] left-[-280px] w-64 h-full bg-[#2c4159] transition-all duration-300 z-40 p-4 flex flex-col shadow-2xl">
            <div class="flex-grow space-y-4">
                <a href="#" class="text-white flex justify-between items-center py-3 border-b border-white/10">📦 Inventario <i class="fas fa-chevron-right text-xs"></i></a>
                <a href="#" class="text-white flex justify-between items-center py-3 border-b border-white/10">💰 Cuentas <i class="fas fa-chevron-right text-xs"></i></a>
                <a href="#" class="text-white flex justify-between items-center py-3 border-b border-white/10">⚙️ Ajustes <i class="fas fa-chevron-right text-xs"></i></a>
            </div>
            <div class="border-t border-white/20 pt-4 pb-20 space-y-4">
                <a href="#" class="text-white flex items-center gap-3"> <i class="far fa-user-circle"></i> Mi Cuenta</a>
                <a href="#" onclick="logout()" class="text-red-400 font-bold flex items-center gap-3"> <i class="fas fa-sign-out-alt"></i> Salir</a>
            </div>
        </nav>

        <main class="flex-grow p-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-gray-400 text-xs mb-1">Ventas Hoy</p>
                    <p class="text-xl font-bold">Q8,450</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-gray-400 text-xs mb-1">Pedidos</p>
                    <p class="text-xl font-bold">126</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold mb-4">Resumen Semanal</h3>
                <div class="h-32 bg-emerald-50 rounded-xl flex items-end justify-between p-4 gap-2">
                    <div class="bg-emerald-500 w-full rounded-t" style="height: 40%"></div>
                    <div class="bg-emerald-500 w-full rounded-t" style="height: 60%"></div>
                    <div class="bg-emerald-500 w-full rounded-t" style="height: 50%"></div>
                    <div class="bg-emerald-500 w-full rounded-t" style="height: 90%"></div>
                    <div class="bg-emerald-300 w-full rounded-t" style="height: 70%"></div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-6 right-6 flex flex-col items-end gap-3">
            <div id="fabMenu" class="hidden flex flex-col gap-3 mb-2 animate-bounce-short">
                <button class="bg-white text-gray-700 px-4 py-2 rounded-full shadow-lg text-sm font-bold border border-gray-100">📝 Cotización</button>
                <button class="bg-white text-gray-700 px-4 py-2 rounded-full shadow-lg text-sm font-bold border border-gray-100">📄 Pedido</button>
            </div>
            <button onclick="toggleFab()" id="fabMain" class="bg-[#2a5a8f] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl transition-transform duration-300">
                <i id="fabIcon" class="fas fa-plus"></i>
            </button>
        </div>
    </div>

    <script>
        // Lógica de navegación simple
        const loginForm = document.getElementById('loginForm');
        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');
        const sidebar = document.getElementById('sidebar');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulación de carga rápida
            const btnText = document.getElementById('btnText');
            btnText.textContent = 'Cargando...';
            
            setTimeout(() => {
                loginView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
            }, 800);
        });

        function logout() {
            if(confirm('¿Cerrar sesión?')) {
                location.reload(); // Recarga la página para volver al login
            }
        }

        function toggleMenu() {
            const isOpen = sidebar.style.left === '0px';
            sidebar.style.left = isOpen ? '-280px' : '0px';
        }

        function toggleFab() {
            const menu = document.getElementById('fabMenu');
            const icon = document.getElementById('fabIcon');
            const isHidden = menu.classList.contains('hidden');
            
            menu.classList.toggle('hidden');
            icon.className = isHidden ? 'fas fa-times' : 'fas fa-plus';
            document.getElementById('fabMain').style.transform = isHidden ? 'rotate(90deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
