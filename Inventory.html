<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario — Cafetería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f4f0;
      --bg-tertiary: #eeecea;
      --text-primary: #1a1a18;
      --text-secondary: #6b6a66;
      --border-light: rgba(0,0,0,0.1);
      --border-mid: rgba(0,0,0,0.15);
      --radius-md: 8px;
      --radius-lg: 12px;
      --purple-bg: #EEEDFE;
      --purple-mid: #534AB7;
      --purple-dark: #3C3489;
      --purple-text: #26215C;
      --teal-bg: #E1F5EE;
      --teal-dark: #085041;
      --amber-bg: #FAEEDA;
      --amber-dark: #633806;
      --red-bg: #FCEBEB;
      --red-dark: #791F1F;
      --blue-bg: #E6F1FB;
      --blue-dark: #0C447C;
      --green-bg: #EAF3DE;
      --green-dark: #27500A;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border-light);
      margin-bottom: 1.5rem;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: var(--purple-dark);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--purple-bg);
      font-size: 20px;
    }
    .app-title { font-size: 18px; font-weight: 500; color: var(--text-primary); }
    .app-sub   { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
    .date-label { font-size: 12px; color: var(--text-secondary); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      padding: 0.9rem 1rem;
      border: 0.5px solid var(--border-light);
    }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 500; color: var(--text-primary); }
    .stat-value.ok     { color: #0F6E56; }
    .stat-value.warn   { color: #854F0B; }
    .stat-value.danger { color: #A32D2D; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 240px;
    }
    .search-wrap i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-secondary);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--purple-mid); }

    .filter-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--purple-bg);
      color: var(--purple-dark);
      border-color: #AFA9EC;
      font-weight: 500;
    }
    .filter-btn:hover:not(.active) { background: var(--bg-secondary); }

    .add-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      background: var(--purple-dark);
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--purple-bg);
      cursor: pointer;
      margin-left: auto;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--purple-mid); }

    /* Table */
    .table-wrap {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }
    thead tr { background: var(--bg-secondary); }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 0.5px solid var(--border-light);
    }
    tbody tr {
      border-bottom: 0.5px solid var(--border-light);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-secondary); }
    tbody td { padding: 11px 14px; vertical-align: middle; color: var(--text-primary); }

    .col-prod  { width: 22%; }
    .col-cat   { width: 15%; }
    .col-stock { width: 22%; }
    .col-unit  { width: 9%;  }
    .col-min   { width: 9%;  }
    .col-estado{ width: 13%; }
    .col-acc   { width: 10%; text-align: center; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-ok   { background: var(--teal-bg);  color: var(--teal-dark); }
    .badge-low  { background: var(--amber-bg); color: var(--amber-dark); }
    .badge-out  { background: var(--red-bg);   color: var(--red-dark); }

    .cat-pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .cat-bebidas   { background: var(--blue-bg);   color: var(--blue-dark); }
    .cat-alimentos { background: var(--green-bg);  color: var(--green-dark); }
    .cat-insumos   { background: var(--amber-bg);  color: var(--amber-dark); }
    .cat-limpieza  { background: var(--red-bg);    color: var(--red-dark); }
    .cat-equipos   { background: var(--purple-bg); color: var(--purple-dark); }

    /* Stock bar */
    .stock-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .stock-bar-bg {
      flex: 1; height: 5px;
      background: var(--bg-tertiary);
      border-radius: 99px;
      overflow: hidden;
    }
    .stock-bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
    .fill-ok  { background: #1D9E75; }
    .fill-low { background: #EF9F27; }
    .fill-out { background: #E24B4A; }
    .stock-num { font-size: 12px; color: var(--text-secondary); min-width: 28px; text-align: right; }

    /* Action buttons */
    .action-btn {
      background: transparent;
      border: 0.5px solid transparent;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 5px 7px;
      border-radius: var(--radius-md);
      font-size: 15px;
      transition: all 0.12s;
    }
    .action-btn:hover {
      color: var(--text-primary);
      background: var(--bg-secondary);
      border-color: var(--border-light);
    }
    .action-btn.danger:hover { color: var(--red-dark); background: var(--red-bg); }

    .empty-row td {
      text-align: center;
      padding: 2.5rem;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* ── MOBILE CARDS (ocultas en desktop) ── */
    .mobile-list { display: none; flex-direction: column; gap: 10px; }
    .mobile-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1rem;
    }
    .mobile-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .mobile-card-name { font-size: 15px; font-weight: 500; flex: 1; }
    .mobile-card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .mobile-card-stock {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mobile-card-stock .stock-bar-bg { flex: 1; }
    .mobile-card-nums {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .mobile-card-nums span strong {
      font-weight: 500;
      color: var(--text-primary);
    }
    .mobile-card-actions {
      display: flex;
      gap: 8px;
      border-top: 0.5px solid var(--border-light);
      padding-top: 10px;
      margin-top: 2px;
    }
    .mobile-action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-mid);
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
    }
    .mobile-action-btn:hover { background: var(--bg-secondary); }
    .mobile-action-btn.danger { color: var(--red-dark); border-color: #F0959580; }
    .mobile-action-btn.danger:hover { background: var(--red-bg); }

    /* ── RESPONSIVE BREAKPOINTS ── */
    @media (max-width: 700px) {
      body { padding: 1rem 0.75rem; }
      .app-title { font-size: 16px; }
      .date-label { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-value { font-size: 20px; }
      .toolbar { gap: 6px; }
      .search-wrap { max-width: 100%; min-width: 0; flex: 1 1 100%; order: -1; }
      .filters-row { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; width: 100%; padding-bottom: 2px; }
      .filters-row::-webkit-scrollbar { display: none; }
      .add-btn { width: 100%; justify-content: center; margin-left: 0; }
      /* tabla → ocultar, mostrar cards */
      .table-wrap { display: none; }
      .mobile-list { display: flex; }
    }

    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { margin: 0.5rem; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border-light);
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      margin: 1rem;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .modal-title { font-size: 16px; font-weight: 500; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 18px; padding: 4px;
      border-radius: var(--radius-md);
    }
    .modal-close:hover { background: var(--bg-secondary); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 10px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--purple-mid); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      padding: 7px 14px;
      background: transparent;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .btn-cancel:hover { background: var(--bg-secondary); }
    .btn-save {
      padding: 7px 18px;
      background: var(--purple-dark);
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--purple-bg);
      cursor: pointer;
    }
    .btn-save:hover { background: var(--purple-mid); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon"><i class="ti ti-coffee" aria-hidden="true"></i></div>
      <div>
        <div class="app-title">Inventario — Cafetería</div>
        <div class="app-sub">Control de stock en tiempo real</div>
      </div>
    </div>
    <div class="date-label" id="date-label"></div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total productos</div>
      <div class="stat-value" id="total-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Stock normal</div>
      <div class="stat-value ok" id="ok-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Stock bajo</div>
      <div class="stat-value warn" id="low-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Agotados</div>
      <div class="stat-value danger" id="out-count">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search-input" placeholder="Buscar producto…" oninput="renderTable()" />
    </div>
    <div class="filters-row">
      <button class="filter-btn active" data-cat="Todos"     onclick="setFilter(this)">Todos</button>
      <button class="filter-btn"        data-cat="Bebidas"   onclick="setFilter(this)"><i class="ti ti-droplet" aria-hidden="true"></i> Bebidas</button>
      <button class="filter-btn"        data-cat="Alimentos" onclick="setFilter(this)"><i class="ti ti-bread" aria-hidden="true"></i> Alimentos</button>
      <button class="filter-btn"        data-cat="Insumos"   onclick="setFilter(this)"><i class="ti ti-box" aria-hidden="true"></i> Insumos</button>
      <button class="filter-btn"        data-cat="Limpieza"  onclick="setFilter(this)"><i class="ti ti-sparkles" aria-hidden="true"></i> Limpieza</button>
    </div>
    <button class="add-btn" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Agregar producto</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-prod">Producto</th>
          <th class="col-cat">Categoría</th>
          <th class="col-stock">Stock actual</th>
          <th class="col-unit">Unidad</th>
          <th class="col-min">Mín.</th>
          <th class="col-estado">Estado</th>
          <th class="col-acc">Acciones</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Vista móvil: cards -->
  <div class="mobile-list" id="mobile-list"></div>

</div>

<!-- Modal agregar/editar -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Agregar producto</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="form-group">
      <label>Nombre del producto</label>
      <input type="text" id="f-nombre" placeholder="Ej. Leche deslactosada" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoría</label>
        <select id="f-cat">
          <option>Bebidas</option>
          <option>Alimentos</option>
          <option>Insumos</option>
          <option>Limpieza</option>
          <option>Equipos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Unidad</label>
        <input type="text" id="f-unit" placeholder="kg, L, pzas…" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stock actual</label>
        <input type="number" id="f-stock" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Stock mínimo</label>
        <input type="number" id="f-min" placeholder="0" min="0" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save"   onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let items = [
    { nombre: "Café en grano",       cat: "Bebidas",    stock: 12, min: 5,   unit: "kg" },
    { nombre: "Leche entera",        cat: "Bebidas",    stock: 3,  min: 8,   unit: "L" },
    { nombre: "Chocolate en polvo",  cat: "Bebidas",    stock: 7,  min: 3,   unit: "kg" },
    { nombre: "Jarabe de vainilla",  cat: "Bebidas",    stock: 2,  min: 3,   unit: "btl" },
    { nombre: "Azúcar blanca",       cat: "Alimentos",  stock: 18, min: 5,   unit: "kg" },
    { nombre: "Pan dulce",           cat: "Alimentos",  stock: 0,  min: 20,  unit: "pzas" },
    { nombre: "Croissants",          cat: "Alimentos",  stock: 6,  min: 10,  unit: "pzas" },
    { nombre: "Mermelada fresa",     cat: "Alimentos",  stock: 4,  min: 3,   unit: "frsc" },
    { nombre: "Vasos desechables",   cat: "Insumos",    stock: 200,min: 50,  unit: "pzas" },
    { nombre: "Tapas para vaso",     cat: "Insumos",    stock: 40, min: 50,  unit: "pzas" },
    { nombre: "Servilletas",         cat: "Insumos",    stock: 500,min: 100, unit: "pzas" },
    { nombre: "Filtros de café",     cat: "Insumos",    stock: 0,  min: 30,  unit: "pzas" },
    { nombre: "Detergente loza",     cat: "Limpieza",   stock: 2,  min: 2,   unit: "L" },
    { nombre: "Desinfectante",       cat: "Limpieza",   stock: 1,  min: 2,   unit: "L" },
    { nombre: "Papel higiénico",     cat: "Limpieza",   stock: 24, min: 6,   unit: "rollos" },
  ];

  let activeFilter = "Todos";
  let editIndex = -1;

  const catClass = {
    Bebidas: "cat-bebidas", Alimentos: "cat-alimentos",
    Insumos: "cat-insumos", Limpieza:  "cat-limpieza", Equipos: "cat-equipos"
  };
  const statusLabel = { ok: "Normal", low: "Stock bajo", out: "Agotado" };
  const badgeClass  = { ok: "badge-ok", low: "badge-low", out: "badge-out" };
  const fillClass   = { ok: "fill-ok",  low: "fill-low",  out: "fill-out" };

  function getStatus(item) {
    if (item.stock === 0)          return "out";
    if (item.stock < item.min)     return "low";
    return "ok";
  }

  function getPct(item) {
    const max = Math.max(item.min * 2, item.stock, 1);
    return Math.min(100, Math.round((item.stock / max) * 100));
  }

  function setFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = items
      .map((item, idx) => ({ item, idx }))
      .filter(({ item }) => {
        const matchCat = activeFilter === "Todos" || item.cat === activeFilter;
        const matchQ   = item.nombre.toLowerCase().includes(q);
        return matchCat && matchQ;
      });

    const tbody = document.getElementById('table-body');
    const mlist = document.getElementById('mobile-list');

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No se encontraron productos.</td></tr>';
      mlist.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:13px;padding:2rem 0;">No se encontraron productos.</p>';
    } else {
      // Tabla desktop
      tbody.innerHTML = filtered.map(({ item, idx }) => {
        const st  = getStatus(item);
        const pct = getPct(item);
        return `<tr>
          <td class="col-prod" style="font-weight:500;">${item.nombre}</td>
          <td class="col-cat"><span class="cat-pill ${catClass[item.cat]}">${item.cat}</span></td>
          <td class="col-stock">
            <div class="stock-bar-wrap">
              <div class="stock-bar-bg"><div class="stock-bar-fill ${fillClass[st]}" style="width:${pct}%"></div></div>
              <span class="stock-num">${item.stock}</span>
            </div>
          </td>
          <td class="col-unit" style="color:var(--text-secondary);">${item.unit}</td>
          <td class="col-min"  style="color:var(--text-secondary);">${item.min}</td>
          <td class="col-estado"><span class="badge ${badgeClass[st]}">${statusLabel[st]}</span></td>
          <td class="col-acc" style="text-align:center; display:flex; gap:4px; justify-content:center;">
            <button class="action-btn" title="Editar" onclick="openEdit(${idx})"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="action-btn danger" title="Eliminar" onclick="deleteItem(${idx})"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </td>
        </tr>`;
      }).join('');

      // Cards móvil
      mlist.innerHTML = filtered.map(({ item, idx }) => {
        const st  = getStatus(item);
        const pct = getPct(item);
        return `<div class="mobile-card">
          <div class="mobile-card-top">
            <div class="mobile-card-name">${item.nombre}</div>
            <span class="badge ${badgeClass[st]}">${statusLabel[st]}</span>
          </div>
          <div class="mobile-card-meta">
            <span class="cat-pill ${catClass[item.cat]}">${item.cat}</span>
          </div>
          <div class="mobile-card-stock">
            <div class="stock-bar-bg" style="flex:1;height:5px;border-radius:99px;background:var(--bg-tertiary);overflow:hidden;">
              <div class="stock-bar-fill ${fillClass[st]}" style="width:${pct}%;height:100%;border-radius:99px;"></div>
            </div>
            <span class="stock-num">${item.stock} ${item.unit}</span>
          </div>
          <div class="mobile-card-nums">
            <span>Stock actual: <strong>${item.stock} ${item.unit}</strong></span>
            <span>Mínimo: <strong>${item.min} ${item.unit}</strong></span>
          </div>
          <div class="mobile-card-actions">
            <button class="mobile-action-btn" onclick="openEdit(${idx})"><i class="ti ti-edit" aria-hidden="true"></i> Editar</button>
            <button class="mobile-action-btn danger" onclick="deleteItem(${idx})"><i class="ti ti-trash" aria-hidden="true"></i> Eliminar</button>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('total-count').textContent = items.length;
    document.getElementById('ok-count').textContent    = items.filter(i => getStatus(i) === 'ok').length;
    document.getElementById('low-count').textContent   = items.filter(i => getStatus(i) === 'low').length;
    document.getElementById('out-count').textContent   = items.filter(i => getStatus(i) === 'out').length;
  }

  function openModal(title = "Agregar producto") {
    editIndex = -1;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-cat').value    = 'Bebidas';
    document.getElementById('f-unit').value   = '';
    document.getElementById('f-stock').value  = '';
    document.getElementById('f-min').value    = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-nombre').focus(), 50);
  }

  function openEdit(idx) {
    editIndex = idx;
    const item = items[idx];
    document.getElementById('modal-title').textContent = "Editar producto";
    document.getElementById('f-nombre').value = item.nombre;
    document.getElementById('f-cat').value    = item.cat;
    document.getElementById('f-unit').value   = item.unit;
    document.getElementById('f-stock').value  = item.stock;
    document.getElementById('f-min').value    = item.min;
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-nombre').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function saveItem() {
    const nombre = document.getElementById('f-nombre').value.trim();
    const cat    = document.getElementById('f-cat').value;
    const unit   = document.getElementById('f-unit').value.trim();
    const stock  = parseInt(document.getElementById('f-stock').value) || 0;
    const min    = parseInt(document.getElementById('f-min').value)   || 0;

    if (!nombre || !unit) {
      showToast("Completa el nombre y la unidad.");
      return;
    }

    if (editIndex >= 0) {
      items[editIndex] = { nombre, cat, stock, min, unit };
      showToast("Producto actualizado.");
    } else {
      items.push({ nombre, cat, stock, min, unit });
      showToast("Producto agregado.");
    }

    closeModal();
    renderTable();
  }

  function deleteItem(idx) {
    if (!confirm(`¿Eliminar "${items[idx].nombre}"?`)) return;
    items.splice(idx, 1);
    renderTable();
    showToast("Producto eliminado.");
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Date
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('es-GT', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  renderTable();
</script>
</body>
</html>
