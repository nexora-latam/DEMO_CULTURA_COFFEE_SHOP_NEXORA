<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Cultura Coffee Shop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Para evitar problemas visuales al hacer scroll en móviles */
        .min-h-dvh {
            min-height: 100vh;
            min-height: 100dvh;
        }
        /* Ocultar el ícono de ojo nativo de navegadores como Edge y Windows */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased overflow-y-auto">

    <div class="min-h-dvh flex flex-col justify-center items-center p-4 relative">
        
        <!-- Contenedor central blanco -->
        <div class="w-full max-w-[22rem] sm:max-w-md bg-white p-6 sm:p-8 md:p-10 rounded-2xl sm:rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-100 flex flex-col items-center relative z-10 m-auto">
            
            <!-- Logo -->
            <div class="mb-4 sm:mb-6 flex flex-col items-center">
                <img 
                    src="ccs.jpg" 
                    alt="Cultura Coffee Shop Logo" 
                    class="w-24 h-24 sm:w-32 sm:h-32 object-cover rounded-full shadow-sm border-2 border-gray-100 bg-white transition-all"
                    onerror="this.onerror=null; this.src='https://placehold.co/200x200/0A1813/10B981?text=CULTURA\\nCOFFEE';"
                />
            </div>
            
            <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-1 text-center">Bienvenido de nuevo</h2>
            <p class="text-gray-500 mb-6 sm:mb-8 text-center text-xs sm:text-sm px-2">Ingresa tus credenciales para acceder al sistema</p>

            <!-- Mensaje de Error (Oculto por defecto) -->
            <div id="errorMessage" class="hidden w-full bg-red-50 text-red-600 border border-red-200 text-xs sm:text-sm p-3 rounded-xl mb-4 text-center font-medium">
            </div>

            <!-- Formulario -->
            <form id="loginForm" class="w-full space-y-4 sm:space-y-5">
                <div>
                    <label for="username" class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-1.5">Usuario</label>
                    <input 
                        type="text" 
                        id="username"
                        class="w-full px-3 sm:px-4 py-2.5 sm:py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-gray-800 bg-gray-50/50 text-sm sm:text-base"
                        placeholder="Ej. admin"
                        required
                    />
                </div>
                <div>
                    <label for="password" class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1 sm:mb-1.5">Contraseña</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            class="w-full px-3 sm:px-4 py-2.5 sm:py-3 pr-10 sm:pr-12 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-gray-800 bg-gray-50/50 text-sm sm:text-base"
                            placeholder="••••••••"
                            required
                        />
                        <!-- Botón Mostrar/Ocultar Contraseña -->
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 sm:pr-4 flex items-center text-gray-400 hover:text-emerald-600 focus:outline-none transition-colors">
                            <!-- Icono Ojo (Visible cuando es password) -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <!-- Icono Ojo Tachado (Visible cuando es texto) -->
                            <svg id="eyeSlashIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden w-5 h-5 sm:w-6 sm:h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button 
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-[#0A1813] hover:bg-emerald-700 text-white font-bold py-3 sm:py-3.5 px-4 rounded-xl transition-all duration-200 mt-2 sm:mt-4 text-sm sm:text-base flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20 active:scale-[0.98]"
                >
                    <span id="btnText">Ingresar</span>
                    <svg id="loadingSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
        
        <!-- Footer Branding de Nexora -->
        <div class="mt-6 sm:mt-8 pb-4 text-center relative z-10 shrink-0">
            <p class="text-xs sm:text-sm text-gray-500 font-medium tracking-wide flex items-center justify-center gap-1.5">
                Desarrollado por <span class="text-[#0A1813] font-bold text-sm sm:text-base tracking-wider">NEXORA</span>
            </p>
        </div>

    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8BS-pYso1UmepeZK7sL-U2FrdACk6aDYBjvF1lDUI1TSN0iLxhNSYjpomLzvwr4vl/exec';

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        
        // Elementos para mostrar/ocultar contraseña
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeSlashIcon = document.getElementById('eyeSlashIcon');

        // Lógica para alternar la visibilidad de la contraseña
        togglePasswordBtn.addEventListener('click', () => {
            // Verifica el tipo actual del input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Alterna los íconos
            eyeIcon.classList.toggle('hidden');
            eyeSlashIcon.classList.toggle('hidden');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) return;

            // Estado de carga (Loading)
            setLoadingState(true);

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Login exitoso -> Redireccionar al dashboard
                    window.location.href = 'dashboard_demo_cultura_coffee_shop.html';
                } else {
                    // Mostrar error
                    showError(result.message || 'Usuario o contraseña incorrectos');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Error de conexión. Revisa tu internet e intenta nuevamente.');
            } finally {
                setLoadingState(false);
            }
        });

        function setLoadingState(isLoading) {
            usernameInput.disabled = isLoading;
            passwordInput.disabled = isLoading;
            submitBtn.disabled = isLoading;
            togglePasswordBtn.disabled = isLoading;

            if (isLoading) {
                btnText.textContent = 'Validando...';
                loadingSpinner.classList.remove('hidden');
                submitBtn.classList.replace('bg-[#0A1813]', 'bg-gray-400');
                submitBtn.classList.replace('hover:bg-emerald-700', 'cursor-not-allowed');
                errorMessage.classList.add('hidden'); // Ocultar error previo al reintentar
            } else {
                btnText.textContent = 'Ingresar';
                loadingSpinner.classList.add('hidden');
                submitBtn.classList.replace('bg-gray-400', 'bg-[#0A1813]');
                submitBtn.classList.replace('cursor-not-allowed', 'hover:bg-emerald-700');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }
    </script>
</body>
</html>
